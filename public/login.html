<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – Smart Warehouse</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        .auth-container { max-width: 400px; }
        .error-msg { color: #dc2626; font-size: .85em; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div style="text-align:center; margin-bottom:24px;">
            <h2 style="margin:4px 0 2px; font-size:1.3em;">INSITE</h2>
            <p style="color:#6c757d; font-size:.85em; margin:0;">Hệ thống quản lý kho thông minh</p>
        </div>

        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập...">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>

        <p class="error-msg" id="error-msg">Sai tên đăng nhập hoặc mật khẩu!</p>

        <button onclick="doLogin()" style="width:100%; margin-top:8px; padding:12px; background:#111827; color:#fff; border:none; border-radius:8px; font-size:1em; font-weight:600; cursor:pointer; transition: all .22s cubic-bezier(.4,0,.2,1);"
            onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(17,24,39,.3)'"
            onmouseout="this.style.transform='';this.style.boxShadow=''">
            Đăng nhập
        </button>
    </div>

    <script>
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';

            if (!username || !password) {
                errEl.textContent = 'Vui lòng nhập đầy đủ thông tin!';
                errEl.style.display = 'block';
                return;
            }

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (!res.ok) {
                errEl.textContent = data.error || 'Đăng nhập thất bại!';
                errEl.style.display = 'block';
                return;
            }

            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
